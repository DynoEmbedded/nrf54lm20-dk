# probe-rs target description for the nRF54LM20B (the silicon on the nRF54LM20-DK).
#
# probe-rs (incl. master as of writing) only ships an "nRF54LM20A" target. That
# entry's flash algorithm and memory map are what physically flash this DK -- its
# FICR auto-detect id is 0x41414142 (the trailing 0x42 == 'B'). This file clones
# that definition under the name "nRF54LM20B" so `--chip nRF54LM20B` resolves.
#
# Flash algorithm is verbatim from probe-rs/targets/nRF54L_Series.yaml (which in
# turn uses https://github.com/embassy-rs/nrf54l-flash-algo). See NOTES.md.
#
# CLI:  probe-rs run --chip nRF54LM20B --chip-description-path targets/nRF54LM20B.yaml <elf>
# Lib:  Registry::add_target_family_from_yaml(include_str!(...)) then attach_with_registry.

name: nRF54LM20B Series
manufacturer:
  id: 0x44
  cc: 0x2
chip_detection:
  - !NordicFicrInfo
    part_address: 0xffc31c
    variant_address: 0xffc320
    part: 0x54B15
    variants:
      0x41414142: nRF54LM20B
variants:
  - name: nRF54LM20B
    cores:
      - name: main
        type: armv8m
        core_access_options: !Arm
          ap: !v1 0
    memory_map:
      - !Nvm
        range:
          start: 0x0
          end: 0x1FD000
        cores:
          - main
        access:
          boot: true
      - !Ram
        range:
          start: 0x20000000
          end: 0x20080000
        cores:
          - main
    flash_algorithms:
      - nRF54LM20B

flash_algorithms:
  - name: nRF54LM20B
    description: nRF54LM20 flash algorithm (shared A/B)
    default: true
    instructions: 
    load_address: 0x20000020
    pc_init: 0x45
    pc_uninit: 0xd1
    pc_program_page: 0x7b
    pc_erase_sector: 0x31
    pc_erase_all: 0x1
    data_section_offset: 0x20000414
    flash_properties:
      address_range:
        start: 0x0
        end: 0x1FD000
      page_size: 0x1000
      erased_byte_value: 0xff
      program_page_timeout: 1000
      erase_sector_timeout: 2000
      sectors:
        - size: 0x1000
          address: 0x0
    cores:
      - main
